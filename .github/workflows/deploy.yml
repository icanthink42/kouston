name: Deploy Server to EC2

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1  # Change to your region
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build server
        working-directory: ./server
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o kouston-server .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifacts to S3
        working-directory: ./server
        run: |
          aws s3 cp kouston-server s3://${{ env.S3_BUCKET }}/kouston-server
          aws s3 cp kouston.service s3://${{ env.S3_BUCKET }}/kouston@.service

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "mkdir -p /opt/kouston",
              "aws s3 cp s3://${{ env.S3_BUCKET }}/kouston-server /opt/kouston/kouston-server",
              "aws s3 cp s3://${{ env.S3_BUCKET }}/kouston@.service /etc/systemd/system/kouston@.service",
              "chmod +x /opt/kouston/kouston-server",
              "systemctl daemon-reload",
              "systemctl enable kouston@7777 kouston@7778",
              "systemctl restart kouston@7777",
              "systemctl restart kouston@7778",
              "echo Deployment complete"
            ]' \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"

          # Wait for command to complete
          echo "Waiting for deployment to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true

          # Get command result
          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          echo "Deployment status: $RESULT"

          if [ "$RESULT" != "Success" ]; then
            echo "Deployment failed. Getting logs..."
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}"
            exit 1
          fi
